services:
  app:
    image: mohdshuaib42/institute-management-system:latest
    container_name: ims-app
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-students}
      DB_USER: ${MYSQL_USER:-ims_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-ims_password}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-kusumachandashwini}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - ims-network

  db:
    image: mysql:8.4
    container_name: ims-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-students}
      MYSQL_USER: ${MYSQL_USER:-ims_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ims_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/students.sql:/docker-entrypoint-initdb.d/01-students.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ims-network

  nginx:
    image: nginx:1.27-alpine
    container_name: ims-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ims-network

volumes:
  mysql-data:

networks:
  ims-network:
    driver: bridge
